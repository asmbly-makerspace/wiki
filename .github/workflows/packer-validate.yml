name: Packer Validate

on:
  pull_request:
    paths:
      - "packer/**"
      - ".github/workflows/packer-validate.yml"

jobs:
  validate:
    name: packer init & validate (syntax-only)
    runs-on: ubuntu-latest

    # Passed to every step to avoid GitHub API rate-limit errors during
    # plugin downloads and any other packer calls that hit the GitHub API.
    env:
      PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: packer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      # Downloads required plugins. No AWS credentials needed for this step.
      - name: packer init
        run: packer init .

      # -syntax-only checks HCL grammar without contacting any provider APIs.
      # No AWS credentials are required.
      - name: packer validate (syntax only)
        run: packer validate -syntax-only .

