name: Packer Validate

on:
  pull_request:
    paths:
      - "packer/**"
      - ".github/workflows/packer-validate.yml"

jobs:
  validate:
    name: packer init & fmt check
    runs-on: ubuntu-latest

    # Passed to every step to avoid GitHub API rate-limit errors during
    # plugin downloads and any other packer calls that hit the GitHub API.
    env:
      PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: packer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      # Downloads required plugins. No AWS credentials needed for this step.
      - name: packer init
        run: packer init .

      # packer fmt -check validates that every .pkr.hcl file in the directory
      # is parseable and canonically formatted. It never evaluates variables or
      # calls any provider APIs, so no AWS credentials are required.
      - name: packer fmt (syntax + format check)
        run: packer fmt -check .

