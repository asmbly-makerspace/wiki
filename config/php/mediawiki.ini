; mediawiki.ini — PHP settings tuned for MediaWiki 1.43
; Placed in /etc/php.d/ by the Packer build.

; ── Memory & Execution ───────────────────────────────────────────────────────
memory_limit            = 256M
max_execution_time      = 60
max_input_time          = 60
realpath_cache_size     = 4M
realpath_cache_ttl      = 120

; ── Uploads ───────────────────────────────────────────────────────────────────
file_uploads            = On
upload_max_filesize     = 100M
post_max_size           = 100M
max_file_uploads        = 20

; ── Charset ───────────────────────────────────────────────────────────────────
default_charset         = "UTF-8"

; ── Date ──────────────────────────────────────────────────────────────────────
date.timezone           = UTC

; ── Security ──────────────────────────────────────────────────────────────────
expose_php              = Off
display_errors          = Off
log_errors              = On
error_log               = /var/log/php_errors.log
display_startup_errors  = Off

; ── OPcache ───────────────────────────────────────────────────────────────────
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 60
opcache.validate_timestamps    = 1
opcache.save_comments          = 1
opcache.fast_shutdown          = 1

; ── APCu (MediaWiki object cache) ────────────────────────────────────────────
apc.enabled     = 1
apc.shm_size    = 64M
apc.ttl         = 3600
apc.gc_ttl      = 7200
apc.slam_defense = 1

