; mediawiki.ini — PHP settings tuned for MediaWiki 1.43
; Placed in /etc/php.d/ by the Packer build.

; ── Memory & Execution ───────────────────────────────────────────────────────
memory_limit            = 256M
max_execution_time      = 60
max_input_time          = 60
realpath_cache_size     = 4M
realpath_cache_ttl      = 120

; ── Uploads ───────────────────────────────────────────────────────────────────
file_uploads            = On
upload_max_filesize     = 100M
post_max_size           = 100M
max_file_uploads        = 20

; ── Charset ───────────────────────────────────────────────────────────────────
default_charset         = "UTF-8"

; ── Date ──────────────────────────────────────────────────────────────────────
date.timezone           = UTC

; ── Security ──────────────────────────────────────────────────────────────────
expose_php              = Off
display_errors          = Off
log_errors              = On
error_log               = /var/log/php_errors.log
display_startup_errors  = Off

; ── OPcache ───────────────────────────────────────────────────────────────────
; memory_consumption: 192 MB accommodates MW core + extensions without evictions.
; interned_strings_buffer: MW is string-heavy; 16 MB avoids hash collisions.
; max_accelerated_files: MW 1.43 + extensions can exceed 10 000 PHP files.
; revalidate_freq: 60 s is appropriate for production (no live file edits).
; fast_shutdown was removed in PHP 7.2 — do not set it.
; jit=tracing: compile hot code paths to native ARM64; reduces CPU on t4g.
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
opcache.revalidate_freq         = 60
opcache.validate_timestamps     = 1
opcache.save_comments           = 1
opcache.jit                     = tracing
opcache.jit_buffer_size         = 64M

; ── APCu (MediaWiki object cache) ────────────────────────────────────────────
; 128 MB on a 4 GB instance; MW uses APCu heavily as local server cache.
; use_request_time=0: required by MW's APCUBagOStuff — prevents stale TTLs
;   on newly stored keys (APCu bug in versions < 5.1.19).
apc.enabled       = 1
apc.shm_size      = 128M
apc.use_request_time = 0
apc.ttl           = 3600
apc.gc_ttl        = 7200
apc.slam_defense  = 1

