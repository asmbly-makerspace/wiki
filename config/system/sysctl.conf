# 99-mediawiki.conf — kernel tuning for a MediaWiki single-server instance
# Uploaded to /tmp/ by Packer; installed by 00-system.sh.

# Reduce swappiness — MediaWiki benefits from memory being used for caches
vm.swappiness = 10
# Allow more open file descriptors
fs.file-max = 65536
# TCP tuning
net.core.somaxconn = 1024

